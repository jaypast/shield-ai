          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <div style={{ color: T.amber }}>{I.alert}</div>
            <span style={{ fontSize: 12, fontWeight: 700, color: T.amber, fontFamily: F.body }}>

          <div style={{ display: "flex", gap: 8 }}>

              padding: "7px 14px", borderRadius: 8, border: "none",

            <button onClick={() => setScanAlert(false)} style={{

          padding: "8px 12px", borderRadius: 14, background: T.surface, border: `1px solid ${T.border}`,
        }}>
          <input
            value={input}
            onChange={e => handleInput(e.target.value)}
            placeholder="Message Shield AI..."
            style={{
              flex: 1, border: "none", background: "transparent", outline: "none",
              color: T.text, fontSize: 14, fontFamily: F.body,

          <button style={{
            width: 36, height: 36, borderRadius: 10, border: "none",

            color: input.trim() ? "#fff" : T.textDim,

            transition: "all 0.2s",

        </div>
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
          marginTop: 6, fontSize: 10, color: T.textDim, fontFamily: F.mono,

        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   TAB 2: GOALS ENGINE (replaces Agents)
   ═══════════════════════════════════════════ */
function GoalsTab({ initialGoalId }) {
  const [selectedGoal, setSelectedGoal] = useState(initialGoalId || null);
  const [filter, setFilter] = useState("all");
  const [showSchema, setShowSchema] = useState(false);

  useEffect(() => { if (initialGoalId) setSelectedGoal(initialGoalId); }, [initialGoalId]);

  const SC = {
    running: { color: T.green, label: "Running", icon: I.play },
    blocked: { color: T.amber, label: "Blocked", icon: I.alert },
    done: { color: T.blue, label: "Complete", icon: I.check },
    paused: { color: T.textDim, label: "Paused", icon: I.pause },

  const filtered = filter === "all" ? GOALS : GOALS.filter(g => g.status === filter);

  if (selectedGoal) {
    const goal = GOALS.find(g => g.id === selectedGoal);

    const sc = SC[goal.status];

    return (
      <div style={{ overflowY: "auto", height: "100%", padding: "12px 16px 80px" }}>
        <button onClick={() => setSelectedGoal(null)} style={{

        <div style={{

          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <Badge color={sc.color} glow>{sc.icon} {sc.label}</Badge>
            <span style={{ fontSize: 11, color: T.textDim, fontFamily: F.mono }}>
              Iter {goal.iterations}/{goal.maxIterations} · {goal.created}

          </div>
          <div style={{ fontSize: 16, fontWeight: 700, color: T.text, fontFamily: F.body, lineHeight: 1.4, marginBottom: 10 }}>
            {goal.title}

          <ProgressBar value={goal.progress} color={sc.color} h={5} />

        </div>

        {/* Blocker */}
        {goal.blocker && (
          <div style={{
            padding: 16, borderRadius: 14,
            background: `linear-gradient(135deg, ${T.amber}10, ${T.red}06)`,
            border: `1px solid ${T.amber}35`, marginBottom: 14,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ color: T.amber }}>{I.alert}</div>
              <span style={{ fontSize: 14, fontWeight: 700, color: T.amber, fontFamily: F.body }}>
                {goal.blocker.title}
              </span>
            </div>
            <div style={{ fontSize: 12, color: T.textMuted, fontFamily: F.body, lineHeight: 1.6, marginBottom: 12 }}>
              {goal.blocker.description}
            </div>
            <SectionLabel color={T.textDim}>Evidence</SectionLabel>
            {goal.blocker.evidence.map((e, i) => (
              <div key={i} style={{ display: "flex", gap: 8, marginBottom: 4 }}>
                <span style={{ color: T.amber, fontSize: 8, marginTop: 5 }}>●</span>
                <span style={{ fontSize: 12, color: T.textMuted, fontFamily: F.body, lineHeight: 1.5 }}>{e}</span>
              </div>
            ))}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 12 }}>
              {goal.blocker.actions.map((a, i) => (
                <button key={i} style={{
                  width: "100%", padding: "10px 14px", borderRadius: 10,
                  border: i === 0 ? "none" : `1px solid ${T.border}`,
                  background: i === 0 ? T.green : "transparent",
                  color: i === 0 ? "#fff" : T.textMuted,
                  fontSize: 13, fontWeight: i === 0 ? 700 : 500, fontFamily: F.body, cursor: "pointer",
                }}>{a}</button>
              ))}
            </div>
          </div>
        )}

        {/* Steps */}
        <div style={{ padding: 16, borderRadius: 14, background: T.card, border: `1px solid ${T.border}`, marginBottom: 14 }}>
          <SectionLabel>Execution Steps</SectionLabel>
          {goal.steps.map((step, i) => {
            const sc2 = step.status === "done" ? T.green : step.status === "running" ? T.blue : step.status === "blocked" ? T.amber : T.textDim;
            const agent = AGENTS[step.agent];
            return (
              <div key={i} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "10px 0",
                borderBottom: i < goal.steps.length - 1 ? `1px solid ${T.border}` : "none",
              }}>
                <div style={{
                  width: 24, height: 24, borderRadius: 12, flexShrink: 0,
                  background: sc2 + "20", border: `2px solid ${sc2}`,
                  display: "flex", alignItems: "center", justifyContent: "center", color: sc2,
                }}>
                  {step.status === "done" ? I.check :
                   step.status === "running" ? <div style={{ width: 6, height: 6, borderRadius: 3, background: sc2, animation: "pulse 1.5s infinite" }} /> :
                   step.status === "blocked" ? I.alert :
                   <span style={{ fontSize: 9, fontFamily: F.mono }}>{i+1}</span>}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, color: step.status === "pending" ? T.textDim : T.text, fontFamily: F.body }}>

                  {agent && (
                    <span style={{ fontSize: 10, color: agent.color, fontFamily: F.mono }}>{agent.short}</span>

                </div>
                {step.time && <span style={{ fontSize: 11, color: T.textDim, fontFamily: F.mono, flexShrink: 0 }}>{step.time}</span>}

        {/* Goal Schema (collapsible) */}
        <div style={{ borderRadius: 14, background: T.card, border: `1px solid ${T.border}`, marginBottom: 14, overflow: "hidden" }}>
          <button onClick={() => setShowSchema(!showSchema)} style={{
            width: "100%", padding: "14px 16px", background: "none", border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: T.textDim, fontFamily: F.mono, letterSpacing: "0.08em" }}>
              GOAL SCHEMA (6 COMPONENTS)
            </span>
            <span style={{ color: T.textDim, transition: "transform 0.2s", transform: showSchema ? "rotate(180deg)" : "none" }}>
              {I.chevDown}
            </span>
          </button>
          {showSchema && (
            <div style={{ padding: "0 16px 16px" }}>
              {[
                { label: "Outcome", value: goal.outcome, color: T.green },
                { label: "Verification", value: goal.verification, color: T.blue },
                { label: "Constraints", value: goal.constraints, color: T.amber },
                { label: "Boundaries", value: goal.boundaries, color: T.purple },
                { label: "Iteration Policy", value: goal.iterationPolicy, color: T.cyan },
                { label: "Stop Condition", value: goal.stopCondition, color: T.red },
              ].map((f, i) => (
                <div key={i} style={{ marginBottom: i < 5 ? 10 : 0 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: f.color, fontFamily: F.mono, marginBottom: 3, letterSpacing: "0.06em" }}>
                    {f.label}
                  </div>
                  <div style={{
                    fontSize: 12, color: T.textMuted, fontFamily: F.body, lineHeight: 1.5,
                    padding: "7px 10px", borderRadius: 8, background: T.surface, border: `1px solid ${T.border}`,
                  }}>{f.value}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Secrets + Integrations */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
          <div style={{ padding: 12, borderRadius: 12, background: T.card, border: `1px solid ${T.border}` }}>
            <SectionLabel>Secrets Used</SectionLabel>
            {goal.secrets.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3 }}>
                <span style={{ color: T.green }}>{I.key}</span>
                <span style={{ fontSize: 10, color: T.text, fontFamily: F.mono }}>{s}</span>
              </div>
            ))}
          </div>
          <div style={{ padding: 12, borderRadius: 12, background: T.card, border: `1px solid ${T.border}` }}>
            <SectionLabel>Integrations</SectionLabel>
            {goal.integrations.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 3 }}>
                <span style={{ color: T.blue }}>{I.plug}</span>
                <span style={{ fontSize: 10, color: T.text, fontFamily: F.mono }}>{s}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Live Logs */}
        {goal.logs.length > 0 && (
          <div style={{ padding: 14, borderRadius: 14, background: T.bg, border: `1px solid ${T.border}`, marginBottom: 14 }}>
            <SectionLabel>Live Log</SectionLabel>
            {goal.logs.map((log, i) => {
              const lc = log.level === "success" ? T.green : log.level === "warn" ? T.amber : log.level === "error" ? T.red : T.textDim;
              return (
                <div key={i} style={{
                  display: "flex", gap: 8, padding: "5px 0", fontFamily: F.mono, fontSize: 11,
                  borderBottom: i < goal.logs.length - 1 ? `1px solid ${T.border}` : "none",
                }}>
                  <span style={{ color: T.textDim, flexShrink: 0 }}>{log.time}</span>
                  <span style={{ color: lc, lineHeight: 1.5 }}>
                    {log.msg.split(/(\{\{.*?\}\})/).map((part, j) =>
                      part.startsWith("{{") ? (
                        <span key={j} style={{ color: T.green, fontWeight: 700, background: T.green + "15", padding: "1px 5px", borderRadius: 4 }}>{part}</span>
                      ) : part
                    )}
                  </span>
                </div>
              );
            })}
          </div>
        )}

        {/* Controls */}
        {goal.status === "running" && (
          <div style={{ display: "flex", gap: 8 }}>
            <button style={{
              flex: 1, padding: "12px", borderRadius: 10, border: "none",
              background: T.amber, color: T.bg, fontSize: 13, fontWeight: 700, fontFamily: F.mono,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
            }}>{I.pause} Pause</button>
            <button style={{
              flex: 1, padding: "12px", borderRadius: 10, border: `1px solid ${T.red}40`,
              background: "transparent", color: T.red, fontSize: 13, fontWeight: 700, fontFamily: F.mono,
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
            }}>{I.trash} Abort</button>
          </div>
        )}
      </div>
    );
  }

  // ─── GOALS LIST VIEW ───
  return (
    <div style={{ overflowY: "auto", height: "100%", padding: "12px 16px 80px" }}>
      {/* New Goal CTA */}
      <button style={{
        width: "100%", padding: "16px", borderRadius: 14,
        background: `linear-gradient(135deg, ${T.accent}12, ${T.purple}08)`,

        fontSize: 14, fontWeight: 700, fontFamily: F.mono, cursor: "pointer",

      }}>{I.target} /goal — Define new objective</button>

      {/* Plan → Execute → Verify loop */}
      <div style={{ padding: 14, borderRadius: 14, background: T.card, border: `1px solid ${T.border}`, marginBottom: 16 }}>
        <SectionLabel>Goal Execution Loop</SectionLabel>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 0, margin: "8px 0" }}>
          {[
            { label: "Plan", color: T.purple, em: "🧠" },
            { label: "Execute", color: T.blue, em: "⚡" },
            { label: "Verify", color: T.green, em: "✓" },
          ].map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center" }}>
              <div style={{
                padding: "9px 16px", borderRadius: 10,
                background: s.color + "12", border: `1px solid ${s.color}25`, textAlign: "center",
              }}>
                <div style={{ fontSize: 16, marginBottom: 1 }}>{s.em}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: s.color, fontFamily: F.mono }}>{s.label}</div>
              </div>
              {i < 2 && <span style={{ color: T.textDim, margin: "0 5px", fontSize: 14 }}>→</span>}
            </div>
          ))}
        </div>
        <div style={{ textAlign: "center", fontSize: 10, color: T.textDim, fontFamily: F.mono, marginTop: 4 }}>
          ↻ Self-corrects on verification failure
        </div>
      </div>

      {/* Agent Catalog (collapsed row) */}
      <div style={{ padding: 14, borderRadius: 14, background: T.card, border: `1px solid ${T.border}`, marginBottom: 16 }}>
        <SectionLabel>Available Agents</SectionLabel>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {Object.entries(AGENTS).map(([k, a]) => (
            <AgentChip key={k} agentKey={k} />
          ))}
        </div>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 14, overflowX: "auto", paddingBottom: 2 }}>
        {["all", "running", "blocked", "done"].map(f => (
          <Pill key={f} active={filter === f} onClick={() => setFilter(f)}>
            {f.charAt(0).toUpperCase() + f.slice(1)}
          </Pill>
        ))}
      </div>

      {/* Goal Cards */}
      {filtered.map(goal => {
        const sc = SC[goal.status];
        return (
          <div key={goal.id} onClick={() => setSelectedGoal(goal.id)} style={{
            padding: 14, borderRadius: 14, background: T.card,
            border: `1px solid ${goal.status === "blocked" ? T.amber + "35" : T.border}`,
            cursor: "pointer", marginBottom: 10, transition: "border-color 0.2s",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <Badge color={sc.color} glow={goal.status === "running" || goal.status === "blocked"}>
                {sc.icon} {sc.label}
              </Badge>
              <span style={{ fontSize: 11, color: T.textDim, fontFamily: F.mono }}>{goal.created}</span>
            </div>
            <div style={{ fontSize: 14, fontWeight: 600, color: T.text, fontFamily: F.body, lineHeight: 1.4, marginBottom: 8 }}>
              {goal.title}
            </div>
            <ProgressBar value={goal.progress} color={sc.color} />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                {goal.agents.map(a => <AgentChip key={a} agentKey={a} small />)}
              </div>
              <span style={{ color: T.textDim }}>{I.chevRight}</span>
            </div>
            {/* Secrets referenced (small row) */}
            <div style={{ display: "flex", gap: 4, marginTop: 6, flexWrap: "wrap" }}>
              {goal.secrets.map((s, i) => (
                <span key={i} style={{
                  padding: "2px 6px", borderRadius: 4, background: T.green + "12",
                  fontSize: 9, fontFamily: F.mono, color: T.green,
                }}>{I.key} {s}</span>
              ))}
            </div>
            {goal.blocker && (
              <div style={{
                marginTop: 8, padding: "7px 10px", borderRadius: 8,
                background: T.amber + "10", border: `1px solid ${T.amber}18`,
                fontSize: 11, color: T.amber, fontFamily: F.body,
              }}>⚠ {goal.blocker.title} — tap to review</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

                    width: 16, height: 16, borderRadius: 8, background: "#fff",
                    position: "absolute", top: 2, left: rule.on ? 18 : 2, transition: "left 0.2s",
                  }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (section === "integrations") {
    return (
      <div style={{ overflowY: "auto", height: "100%", padding: "12px 16px 24px" }}>
        <button onClick={() => setSection(null)} style={{
          display: "flex", alignItems: "center", gap: 6, background: "none", border: "none",
          color: T.textMuted, fontSize: 13, fontFamily: F.body, cursor: "pointer", padding: 0, marginBottom: 14,
        }}>{I.arrowLeft} Settings</button>
        <div style={{ fontSize: 16, fontWeight: 700, color: T.text, fontFamily: F.display, marginBottom: 14 }}>Integrations</div>

        <SectionLabel>Connected</SectionLabel>
        {[
          { name: "DigitalOcean", status: "Connected", color: T.green },
          { name: "Cloudflare", status: "Connected", color: T.green },
          { name: "Mailgun", status: "Connected", color: T.green },
          { name: "Ghost", status: "Connected", color: T.green },
          { name: "Namecheap", status: "Connected", color: T.green },
        ].map((int, i) => (
          <div key={i} style={{
            padding: "12px 14px", borderRadius: 12, marginBottom: 8,
            background: T.card, border: `1px solid ${T.border}`,
            display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: T.text, fontFamily: F.body }}>{int.name}</span>
            <Badge color={int.color} small>{I.check} {int.status}</Badge>
          </div>
        ))}

        <SectionLabel>Available</SectionLabel>
        {["Buttondown", "Substack", "ConvertKit", "Beehiiv", "AWS SES", "Vercel"].map((name, i) => (
          <div key={i} style={{
            padding: "12px 14px", borderRadius: 12, marginBottom: 8,
            background: T.card, border: `1px solid ${T.border}`,
            display: "flex", alignItems: "center", justifyContent: "space-between",
          }}>
            <span style={{ fontSize: 13, color: T.textMuted, fontFamily: F.body }}>{name}</span>
            <button style={{
              padding: "5px 12px", borderRadius: 7, border: `1px solid ${T.accent}40`,
              background: "transparent", color: T.accent, fontSize: 11, fontWeight: 600,
              fontFamily: F.mono, cursor: "pointer",
            }}>Connect</button>
          </div>
        ))}
      </div>
    );
  }

  // ─── Settings menu ───
  return (
    <div style={{ overflowY: "auto", height: "100%", padding: "12px 16px 24px" }}>
      <div style={{ fontSize: 18, fontWeight: 800, color: T.text, fontFamily: F.display, marginBottom: 4 }}>Settings</div>
      <div style={{ fontSize: 12, color: T.textDim, fontFamily: F.body, marginBottom: 16 }}>Platform configuration & account</div>

      {sections.map((s, i) => (
        <button key={s.key} onClick={() => setSection(s.key)} style={{
          width: "100%", padding: "14px 16px", borderRadius: 14, marginBottom: 8,
          background: T.card, border: `1px solid ${T.border}`,
          display: "flex", alignItems: "center", gap: 12,
          cursor: "pointer", textAlign: "left",
        }}>
          <div style={{
            width: 36, height: 36, borderRadius: 10,
            background: s.color + "15", border: `1px solid ${s.color}25`,
            display: "flex", alignItems: "center", justifyContent: "center", color: s.color,
            flexShrink: 0,
          }}>{s.icon}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: T.text, fontFamily: F.body }}>{s.label}</div>
            <div style={{ fontSize: 11, color: T.textDim, fontFamily: F.body }}>{s.desc}</div>
          </div>
          <span style={{ color: T.textDim }}>{I.chevRight}</span>
        </button>
      ))}

      {/* Current plan badge */}
      <div style={{
        marginTop: 8, padding: 14, borderRadius: 14,
        background: `linear-gradient(135deg, ${T.purple}10, ${T.card})`,
        border: `1px solid ${T.purple}25`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div>
          <div style={{ fontSize: 11, color: T.textDim, fontFamily: F.mono, letterSpacing: "0.06em", marginBottom: 2 }}>CURRENT PLAN</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: T.purple, fontFamily: F.display }}>Shield Pro</div>
        </div>
        <Badge color={T.purple}>$19.99/mo</Badge>
      </div>

      {/* App info */}
      <div style={{ textAlign: "center", marginTop: 20, fontSize: 10, color: T.textDim, fontFamily: F.mono }}>
        Shield AI · Built for QuackQuackMoo · Zero-retention architecture
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP SHELL
   ═══════════════════════════════════════════ */
function ShieldAI() {
  const [tab, setTab] = useState("chat");
  const [goalDeepLink, setGoalDeepLink] = useState(null);
  const [isWide, setIsWide] = useState(false);

  useEffect(() => {
    const check = () => setIsWide(window.innerWidth > 700);
    check();
    window.addEventListener("resize", check);
    return () => window.removeEventListener("resize", check);
  }, []);

  const handleGoalTap = (goalId) => {
    setGoalDeepLink(goalId);
    setTab("goals");
  };

  const [showSettings, setShowSettings] = useState(false);

  const tabs = [
    { key: "chat", label: "Chat", icon: I.chat },
    { key: "goals", label: "Goals", icon: I.target },
    { key: "code", label: "Code", icon: I.code },
    { key: "privacy", label: "Privacy", icon: I.shield },
  ];

  const renderContent = () => {
    if (showSettings) return <SettingsPanel onClose={() => setShowSettings(false)} />;
    switch (tab) {
      case "chat": return <ChatTab onGoalTap={handleGoalTap} />;
      case "goals": return <GoalsTab initialGoalId={goalDeepLink} />;
      case "code": return <CodeTab />;
      case "privacy": return <PrivacyTab />;
      default: return null;
    }
  };

  return (
    <div style={{
      width: "100%", maxWidth: isWide ? 900 : 430, margin: "0 auto",
      background: T.bg, height: "100vh",
      display: "flex", flexDirection: "column",
      fontFamily: F.body, color: T.text,
      position: "relative",
      borderLeft: isWide ? `1px solid ${T.border}` : "none",
      borderRight: isWide ? `1px solid ${T.border}` : "none",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700;800;900&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: ${T.border}; border-radius: 3px; }
        input::placeholder { color: ${T.textDim}; }
      `}</style>

      {/* Header */}
      <div style={{
        padding: "14px 16px", borderBottom: `1px solid ${T.border}`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        flexShrink: 0,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{
            width: 30, height: 30, borderRadius: 9,
            background: `linear-gradient(135deg, ${T.accent}, ${T.accentSoft})`,
            display: "flex", alignItems: "center", justifyContent: "center", color: "#fff",
          }}>{I.shield}</div>
          <div>
            <span style={{
              fontSize: 16, fontWeight: 800, fontFamily: F.display,
              background: `linear-gradient(135deg, ${T.accent}, ${T.accentSoft})`,
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
            }}>SHIELD AI</span>
            <span style={{ fontSize: 10, color: T.textDim, fontFamily: F.mono, display: "block", marginTop: -2, letterSpacing: "0.06em" }}>
              Privacy-First · {isWide ? "Desktop" : "Mobile"}
            </span>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <div style={{ width: 6, height: 6, borderRadius: 3, background: T.privacyGreen, boxShadow: `0 0 6px ${T.privacyGreen}60` }} />
            <span style={{ fontSize: 10, color: T.privacyGreen, fontFamily: F.mono, fontWeight: 600 }}>SECURE</span>
          </div>
          <button onClick={() => setShowSettings(!showSettings)} style={{
            width: 34, height: 34, borderRadius: 9, border: `1px solid ${showSettings ? T.accent + "50" : T.border}`,
            background: showSettings ? T.accent + "12" : "transparent",
            color: showSettings ? T.accent : T.textMuted,
            cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.2s",
          }}>{I.settings}</button>
        </div>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
        {renderContent()}
      </div>

      {/* Bottom Tab Bar */}
      {!showSettings && (
      <div style={{
        display: "flex", borderTop: `1px solid ${T.border}`,
        background: T.surface, padding: "6px 4px 10px", flexShrink: 0,
      }}>
        {tabs.map(t => {
          const active = tab === t.key;
          return (
            <button key={t.key} onClick={() => { setTab(t.key); if (t.key !== "goals") setGoalDeepLink(null); }} style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
              background: "none", border: "none", cursor: "pointer",
              color: active ? T.accent : T.textDim,
              transition: "color 0.2s",
              padding: "4px 0",
            }}>
              <div style={{
                transition: "transform 0.2s",
                transform: active ? "scale(1.15)" : "scale(1)",
              }}>{t.icon}</div>
              <span style={{
                fontSize: 10, fontWeight: active ? 700 : 500, fontFamily: F.body,
                letterSpacing: "0.02em",
              }}>{t.label}</span>
              {active && (
                <div style={{
                  width: 4, height: 4, borderRadius: 2,
                  background: T.accent, boxShadow: `0 0 6px ${T.accent}60`,
                  marginTop: -1,
                }} />
              )}
            </button>
          );
        })}
      </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(ShieldAI));
  </script>
</body>
</html>
